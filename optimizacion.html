<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optimización para SVM — IoT ML</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0E1A; --surface:#111827; --card:#1F2937;
  --border:#374151; --text:#F9FAFB; --muted:#9CA3AF;
  --teal:#00C2A8; --orange:#FF7043; --purple:#A855F7;
  --blue:#5B7FFF; --green:#22C55E; --gray:#6B7280;
}
body{background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100vh;padding:0}

header{background:var(--surface);border-bottom:1px solid var(--border);
  padding:.85rem 1.5rem;display:flex;align-items:center;gap:.85rem}
.logo{width:34px;height:34px;background:var(--purple);border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:16px}
header h1{font-size:15px;font-weight:600}
header p{font-size:11.5px;color:var(--muted);margin-top:1px}
.badge{margin-left:auto;background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:3px 11px;font-size:11px;color:var(--muted)}

main{max-width:900px;margin:0 auto;padding:1.25rem 1rem}

.tabs{display:flex;gap:4px;background:var(--card);border-radius:10px;
  padding:4px;width:fit-content;margin-bottom:1rem}
.tab{padding:5px 16px;border-radius:7px;font-size:13px;cursor:pointer;
  color:var(--muted);border:none;background:none;transition:all .15s}
.tab.active{background:var(--surface);color:var(--text);border:1px solid var(--border)}

.ctrl{display:flex;align-items:center;gap:10px;font-size:13px;
  color:var(--muted);margin-bottom:.5rem}
.ctrl span{min-width:110px}
.ctrl input[type=range]{flex:1;accent-color:var(--purple)}
.ctrl .val{font-size:13px;font-weight:500;min-width:40px;
  color:var(--text);font-family:monospace}

.canvas-wrap{background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:1rem;margin-bottom:.75rem}
canvas{display:block;width:100%}

.legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:.5rem;
  font-size:12px;color:var(--muted)}
.leg{display:flex;align-items:center;gap:5px}
.leg-line{width:22px;height:3px;border-radius:2px}
.leg-dot{width:10px;height:10px;border-radius:50%}

.info-box{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:.75rem 1rem;font-size:12.5px;
  color:var(--muted);line-height:1.7;margin-top:.75rem}
.info-box strong{color:var(--text);font-weight:500}

.btns{display:flex;gap:8px;margin-bottom:.75rem}
.btns button{padding:5px 14px;background:var(--card);border:1px solid var(--border);
  border-radius:6px;color:var(--muted);font-size:12px;cursor:pointer}
.btns button:hover{background:var(--border)}

footer{text-align:center;padding:1.5rem;font-size:11px;
  color:var(--muted);border-top:1px solid var(--border);margin-top:1rem}
footer a{color:var(--teal);text-decoration:none}
</style>
</head>
<body>

<header>
  <div class="logo">⚙</div>
  <div>
    <h1>Optimización para SVM — Sin/Con Restricciones</h1>
    <p>Especialización IoT · Machine Learning · Semana 5</p>
  </div>
  <div class="badge">Dr. Oscar Loyola Valenzuela</div>
</header>

<main>
  <div class="tabs">
    <button class="tab active" onclick="setTab(0,this)">Sin restricciones</button>
    <button class="tab" onclick="setTab(1,this)">Con restricción</button>
    <button class="tab" onclick="setTab(2,this)">Margen SVM</button>
  </div>

  <div class="ctrl">
    <span>Learning rate α</span>
    <input type="range" min="1" max="30" value="12" id="lr-slider" oninput="resetAnim()">
    <span class="val" id="lr-val">0.12</span>
  </div>

  <div class="canvas-wrap">
    <canvas id="cv" height="380"></canvas>
    <div class="legend" id="legend"></div>
  </div>

  <div class="btns">
    <button onclick="resetAnim()">↺ Reiniciar</button>
    <button onclick="toggleAnim()" id="play-btn">⏸ Pausar</button>
  </div>

  <div class="info-box" id="info-box"></div>
</main>

<footer>
  Especialización IoT · Machine Learning ·
  <a href="index.html">← Volver al inicio</a> ·
  Dr. Oscar Loyola Valenzuela
</footer>

<script>
const PURPLE='#A855F7',TEAL='#1D9E75',ORANGE='#D85A30',WHITE='#F9FAFB',GRAY='#888780';
let tab=0,frame=0,running=true,rafId=null;
const W=700,H=380;
const PAD={l:55,r:20,t:20,b:40};
const PW=W-PAD.l-PAD.r,PH=H-PAD.t-PAD.b;
function px(x,xmin,xmax){return PAD.l+(x-xmin)/(xmax-xmin)*PW;}
function py(y,ymin,ymax){return PAD.t+(1-(y-ymin)/(ymax-ymin))*PH;}
function getLR(){return parseFloat(document.getElementById('lr-slider').value)/100;}
const cv=document.getElementById('cv');
cv.width=W;cv.height=H;
const ctx=cv.getContext('2d');

function f(x,y){return x*x+2*y*y;}
function grad_f(x,y){return[2*x,4*y];}

let traj0=[],traj1=[];

function initTraj0(){
  const a=getLR();let p=[3,2.5];traj0=[[...p]];
  for(let i=0;i<50;i++){const[gx,gy]=grad_f(...p);p=[p[0]-a*gx,p[1]-a*gy];traj0.push([...p]);}
}
function initTraj1(){
  const a=getLR();let p=[0.3,0.2];traj1=[[Math.max(p[0],(2-p[1])/2+0.01),Math.max(p[1],(2-p[0])/2+0.01)]];
  for(let i=0;i<70;i++){
    let[x,y]=p;
    const[gx,gy]=grad_f(x,y);
    let nx=x-a*gx,ny=y-a*gy;
    if(nx+ny<2){const s=(2-(nx+ny))/2;nx+=s;ny+=s;}
    p=[nx,ny];traj1.push([...p]);
  }
}

function drawAxes(xmin,xmax,ymin,ymax){
  ctx.strokeStyle='rgba(136,135,128,0.35)';ctx.lineWidth=0.5;
  for(let t=Math.ceil(xmin);t<=xmax;t++){ctx.beginPath();ctx.moveTo(px(t,xmin,xmax),PAD.t);ctx.lineTo(px(t,xmin,xmax),PAD.t+PH);ctx.stroke();}
  for(let t=Math.ceil(ymin);t<=ymax;t++){ctx.beginPath();ctx.moveTo(PAD.l,py(t,ymin,ymax));ctx.lineTo(PAD.l+PW,py(t,ymin,ymax));ctx.stroke();}
  ctx.fillStyle='rgba(136,135,128,0.8)';ctx.font='10px monospace';ctx.textAlign='center';
  for(let t=xmin;t<=xmax;t+=Math.ceil((xmax-xmin)/6)){ctx.fillText(t.toFixed(0),px(t,xmin,xmax),PAD.t+PH+16);}
  ctx.textAlign='right';
  for(let t=ymin;t<=ymax;t+=Math.ceil((ymax-ymin)/5)){ctx.fillText(t.toFixed(0),PAD.l-5,py(t,ymin,ymax)+4);}
}

function drawTab0(fr){
  const[xmin,xmax,ymin,ymax]=[-3.5,3.5,-3,3];
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#111827';ctx.fillRect(0,0,W,H);
  // Contornos
  for(let lv=0.5;lv<=18;lv+=1.5){
    ctx.strokeStyle=`rgba(168,85,247,${0.08+lv*0.008})`;ctx.lineWidth=0.7;
    for(let ix=0;ix<PW-1;ix++){
      for(let iy=0;iy<PH-1;iy++){
        const x0=xmin+(ix/PW)*(xmax-xmin),x1=xmin+((ix+1)/PW)*(xmax-xmin);
        const y0=ymax-(iy/PH)*(ymax-ymin),y1=ymax-((iy+1)/PH)*(ymax-ymin);
        const v=[f(x0,y0),f(x1,y0),f(x0,y1),f(x1,y1)];
        if(v.some(v=>v<lv)&&v.some(v=>v>=lv)){
          ctx.beginPath();ctx.moveTo(PAD.l+ix,PAD.t+iy);ctx.lineTo(PAD.l+ix+1,PAD.t+iy);ctx.stroke();
        }
      }
    }
  }
  drawAxes(xmin,xmax,ymin,ymax);
  // Mínimo
  ctx.beginPath();ctx.arc(px(0,xmin,xmax),py(0,ymin,ymax),8,0,Math.PI*2);
  ctx.fillStyle=TEAL;ctx.fill();
  const n=Math.min(fr,traj0.length-1);
  if(n>0){
    ctx.strokeStyle=PURPLE;ctx.lineWidth=2.5;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(px(traj0[0][0],xmin,xmax),py(traj0[0][1],ymin,ymax));
    for(let i=1;i<=n;i++)ctx.lineTo(px(traj0[i][0],xmin,xmax),py(traj0[i][1],ymin,ymax));
    ctx.stroke();
    const[cx,cy]=traj0[n];
    ctx.beginPath();ctx.arc(px(cx,xmin,xmax),py(cy,ymin,ymax),7,0,Math.PI*2);
    ctx.fillStyle=ORANGE;ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font='11px monospace';ctx.textAlign='left';
    ctx.fillText(`f=${f(cx,cy).toFixed(3)}`,px(cx,xmin,xmax)+10,py(cy,ymin,ymax)-4);
  }
  ctx.beginPath();ctx.arc(px(traj0[0][0],xmin,xmax),py(traj0[0][1],ymin,ymax),6,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fill();
  document.getElementById('legend').innerHTML=`
    <div class="leg"><div class="leg-dot" style="background:rgba(255,255,255,0.5)"></div>Inicio (3, 2.5)</div>
    <div class="leg"><div class="leg-line" style="background:${PURPLE}"></div>Trayectoria GD</div>
    <div class="leg"><div class="leg-dot" style="background:${ORANGE}"></div>Posición actual</div>
    <div class="leg"><div class="leg-dot" style="background:${TEAL}"></div>Mínimo (0,0)</div>`;
  document.getElementById('info-box').innerHTML=
    `<strong>f(x,y) = x² + 2y²</strong> — paraboloide.<br>
    El gradiente ∇f = [2x, 4y] apunta cuesta arriba. Nos movemos en la dirección contraria.<br>
    <strong>Sin restricciones</strong>: β puede ser cualquier número — baja libremente hasta (0,0).`;
}

function drawTab1(fr){
  const[xmin,xmax,ymin,ymax]=[-0.5,3.5,-0.5,3];
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#111827';ctx.fillRect(0,0,W,H);
  // Zona factible
  ctx.fillStyle='rgba(29,158,117,0.12)';
  ctx.beginPath();
  ctx.moveTo(px(2,xmin,xmax),py(0,ymin,ymax));
  ctx.lineTo(px(xmax,xmin,xmax),py(0,ymin,ymax));
  ctx.lineTo(px(xmax,xmin,xmax),py(ymax,ymin,ymax));
  ctx.lineTo(px(0,xmin,xmax),py(ymax,ymin,ymax));
  ctx.lineTo(px(0,xmin,xmax),py(2,ymin,ymax));
  ctx.closePath();ctx.fill();
  // Borde restricción
  ctx.strokeStyle=TEAL;ctx.lineWidth=2;ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(px(2,xmin,xmax),py(0,ymin,ymax));ctx.lineTo(px(0,xmin,xmax),py(2,ymin,ymax));ctx.stroke();
  ctx.setLineDash([]);
  // Contornos
  for(let lv=0.5;lv<=15;lv+=1.5){
    ctx.strokeStyle=`rgba(168,85,247,${0.08+lv*0.008})`;ctx.lineWidth=0.7;
    for(let ix=0;ix<PW-1;ix++){
      for(let iy=0;iy<PH-1;iy++){
        const x0=xmin+(ix/PW)*(xmax-xmin),x1=xmin+((ix+1)/PW)*(xmax-xmin);
        const y0=ymax-(iy/PH)*(ymax-ymin),y1=ymax-((iy+1)/PH)*(ymax-ymin);
        const v=[f(x0,y0),f(x1,y0),f(x0,y1),f(x1,y1)];
        if(v.some(v=>v<lv)&&v.some(v=>v>=lv)){
          ctx.beginPath();ctx.moveTo(PAD.l+ix,PAD.t+iy);ctx.lineTo(PAD.l+ix+1,PAD.t+iy);ctx.stroke();
        }
      }
    }
  }
  drawAxes(xmin,xmax,ymin,ymax);
  // Mínimo libre (fuera)
  ctx.beginPath();ctx.arc(px(0,xmin,xmax),py(0,ymin,ymax),7,0,Math.PI*2);
  ctx.fillStyle='rgba(136,135,128,0.5)';ctx.fill();
  ctx.fillStyle='rgba(200,200,200,0.6)';ctx.font='10px monospace';ctx.textAlign='left';
  ctx.fillText('mínimo libre (0,0)',px(0,xmin,xmax)+10,py(0,ymin,ymax)+4);
  // Óptimo restringido
  const[xo,yo]=[4/3,2/3];
  ctx.beginPath();ctx.arc(px(xo,xmin,xmax),py(yo,ymin,ymax),9,0,Math.PI*2);
  ctx.fillStyle=ORANGE;ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font='10px monospace';ctx.textAlign='left';
  ctx.fillText('(4/3, 2/3)',px(xo,xmin,xmax)+12,py(yo,ymin,ymax)-4);
  // Label restricción
  ctx.fillStyle=TEAL;ctx.font='11px monospace';ctx.textAlign='center';
  ctx.fillText('x + y = 2',px(1,xmin,xmax)+15,py(1,ymin,ymax)-10);
  const n=Math.min(fr,traj1.length-1);
  if(n>0){
    ctx.strokeStyle=PURPLE;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(px(traj1[0][0],xmin,xmax),py(traj1[0][1],ymin,ymax));
    for(let i=1;i<=n;i++)ctx.lineTo(px(traj1[i][0],xmin,xmax),py(traj1[i][1],ymin,ymax));
    ctx.stroke();
    const[cx,cy]=traj1[n];
    ctx.beginPath();ctx.arc(px(cx,xmin,xmax),py(cy,ymin,ymax),7,0,Math.PI*2);
    ctx.fillStyle=PURPLE;ctx.fill();
  }
  document.getElementById('legend').innerHTML=`
    <div class="leg"><div class="leg-line" style="background:${TEAL};border-top:2px dashed ${TEAL}"></div>Borde x+y=2</div>
    <div class="leg"><div class="leg-line" style="background:${PURPLE}"></div>Trayectoria proyectada</div>
    <div class="leg"><div class="leg-dot" style="background:${ORANGE}"></div>Óptimo restringido</div>
    <div class="leg"><div class="leg-dot" style="background:rgba(136,135,128,0.5)"></div>Mínimo libre (fuera)</div>`;
  document.getElementById('info-box').innerHTML=
    `<strong>Restricción activa:</strong> x + y ≥ 2 (zona verde).<br>
    El mínimo libre (0,0) está FUERA → la solución se pega al borde de la restricción.<br>
    <strong>En SVM:</strong> los vectores de soporte son los puntos con λᵢ > 0 — pegados al margen.`;
}

function drawTab2(){
  const[xmin,xmax,ymin,ymax]=[-0.5,10,-0.5,8];
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#111827';ctx.fillRect(0,0,W,H);
  drawAxes(xmin,xmax,ymin,ymax);
  // Zona del margen
  ctx.fillStyle='rgba(168,85,247,0.08)';
  ctx.beginPath();
  ctx.moveTo(px(3.5,xmin,xmax),py(ymax,ymin,ymax));
  ctx.lineTo(px(6.5,xmin,xmax),py(ymax,ymin,ymax));
  ctx.lineTo(px(5.5,xmin,xmax),py(ymin,ymin,ymax));
  ctx.lineTo(px(2.5,xmin,xmax),py(ymin,ymin,ymax));
  ctx.closePath();ctx.fill();
  // Márgenes
  ctx.strokeStyle='rgba(168,85,247,0.6)';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(px(3.5,xmin,xmax),py(ymax,ymin,ymax));ctx.lineTo(px(2.5,xmin,xmax),py(ymin,ymin,ymax));ctx.stroke();
  ctx.beginPath();ctx.moveTo(px(6.5,xmin,xmax),py(ymax,ymin,ymax));ctx.lineTo(px(5.5,xmin,xmax),py(ymin,ymin,ymax));ctx.stroke();
  ctx.setLineDash([]);
  // Hiperplano
  ctx.strokeStyle=PURPLE;ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(px(5,xmin,xmax),py(ymax,ymin,ymax));ctx.lineTo(px(4,xmin,xmax),py(ymin,ymin,ymax));ctx.stroke();
  // Puntos clase 0
  [[1.5,4.5],[2,5.5],[1.8,3.8],[2.5,5],[3,4.2],[2.2,6],[3.5,5.5]].forEach(([x,y])=>{
    ctx.beginPath();ctx.arc(px(x,xmin,xmax),py(y,ymin,ymax),6,0,Math.PI*2);
    ctx.fillStyle=TEAL;ctx.fill();ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=0.5;ctx.stroke();
  });
  // Puntos clase 1
  [[6,3],[7,2],[6.5,1.5],[7.5,2.5],[8,3.5],[6.8,1.2],[7.2,3.8]].forEach(([x,y])=>{
    ctx.beginPath();ctx.arc(px(x,xmin,xmax),py(y,ymin,ymax),6,0,Math.PI*2);
    ctx.fillStyle=ORANGE;ctx.fill();ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=0.5;ctx.stroke();
  });
  // Vectores de soporte
  [[3,4.2],[2.5,5],[6,3],[7,2]].forEach(([x,y])=>{
    ctx.beginPath();ctx.arc(px(x,xmin,xmax),py(y,ymin,ymax),13,0,Math.PI*2);
    ctx.strokeStyle='white';ctx.lineWidth=2;ctx.stroke();
  });
  // Flecha de margen
  const my=py(4,ymin,ymax);
  ctx.strokeStyle='rgba(168,85,247,0.8)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(px(3.6,xmin,xmax),my);ctx.lineTo(px(5.9,xmin,xmax),my);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.85)';ctx.font='11px monospace';ctx.textAlign='center';
  ctx.fillText('2/‖w‖',px(4.75,xmin,xmax),my-8);
  // Labels
  ctx.fillStyle=TEAL;ctx.font='12px monospace';ctx.textAlign='left';
  ctx.fillText('Normal',px(0.8,xmin,xmax),py(6.5,ymin,ymax));
  ctx.fillStyle=ORANGE;ctx.fillText('Falla',px(7.8,xmin,xmax),py(4.5,ymin,ymax));
  ctx.fillStyle='rgba(168,85,247,0.9)';ctx.textAlign='center';
  ctx.fillText('w·x + b = 0',px(4.5,xmin,xmax),py(7.5,ymin,ymax));
  document.getElementById('legend').innerHTML=`
    <div class="leg"><div class="leg-line" style="background:${PURPLE}"></div>Hiperplano w·x+b=0</div>
    <div class="leg"><div class="leg-line" style="background:rgba(168,85,247,0.5)"></div>Márgenes ±1</div>
    <div class="leg"><div class="leg-dot" style="background:${TEAL}"></div>Normal</div>
    <div class="leg"><div class="leg-dot" style="background:${ORANGE}"></div>Falla</div>
    <div class="leg" style="gap:6px"><div style="width:12px;height:12px;border-radius:50%;border:2px solid white"></div>Vectores de soporte (λ>0)</div>`;
  document.getElementById('info-box').innerHTML=
    `<strong>SVM minimiza ½‖w‖²</strong> equivale a maximizar el margen 2/‖w‖.<br>
    Solo los <strong>vectores de soporte</strong> (círculo blanco, λᵢ>0) definen el modelo.<br>
    Los demás puntos tienen λᵢ=0 — no importan aunque se muevan (dentro del margen).`;
}

function render(){
  if(tab===0)drawTab0(frame);
  else if(tab===1)drawTab1(frame);
  else drawTab2();
  if(running){
    const max=tab===0?traj0.length:tab===1?traj1.length:1;
    if(frame<max-1)frame++;
  }
  requestAnimationFrame(render);
}

function resetAnim(){
  document.getElementById('lr-val').textContent=getLR().toFixed(2);
  frame=0;running=true;
  document.getElementById('play-btn').textContent='⏸ Pausar';
  if(tab===0)initTraj0();
  else if(tab===1)initTraj1();
}

function toggleAnim(){
  running=!running;
  document.getElementById('play-btn').textContent=running?'⏸ Pausar':'▶ Reanudar';
}

function setTab(t,el){
  tab=t;frame=0;running=true;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',i===t));
  document.getElementById('play-btn').textContent='⏸ Pausar';
  if(t===0)initTraj0();
  else if(t===1)initTraj1();
}

initTraj0();initTraj1();
render();
</script>
</body>
</html>
